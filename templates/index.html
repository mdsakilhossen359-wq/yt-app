<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff0050; --secondary: #00f2ea; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding-bottom: 80px; }
        
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #333; }
        .search-bar { background: #222; border: 1px solid #444; color: white; border-radius: 50px; padding-left: 20px; }
        
        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-title { padding: 10px; font-size: 14px; font-weight: bold; height: 55px; overflow: hidden; }

        /* Navigation Style */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 2000; }
        .nav-btn { background: none; border: none; color: #888; font-size: 11px; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }

        .section { display: none; padding-top: 10px; }
        .section.active { display: block; }

        video { width: 100%; border-radius: 10px; background: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .download-btn { border-radius: 50px; font-weight: bold; font-size: 12px; margin: 2px; }
        
        /* History & Download List */
        .list-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="input-group">
        <input type="text" id="searchInput" class="form-control search-bar" placeholder="Search song or paste link...">
        <button class="btn btn-danger rounded-circle ms-2" onclick="handleSearch()"><i class="fas fa-search"></i></button>
    </div>
</div>

<div class="container mt-2">
    
    <div id="home-sec" class="section active">
        <div id="video-feed" class="row row-cols-1 row-cols-md-2 row-cols-lg-3"></div>
        <div id="loader" class="text-center p-3"><div class="spinner-border text-danger"></div></div>
    </div>

    <div id="playing-sec" class="section">
        <video id="mainVideo" controls autoplay></video>
        <div class="p-3 mt-2 bg-dark rounded shadow">
            <h6 id="playTitle">No Video Selected</h6>
            <div class="d-flex flex-wrap mt-3">
                <button onclick="startDownload('1080p')" class="btn btn-primary download-btn">1080p MP4</button>
                <button onclick="startDownload('720p')" class="btn btn-info download-btn">720p MP4</button>
                <button onclick="startDownload('mp3')" class="btn btn-warning download-btn">MP3 Audio</button>
            </div>
        </div>
    </div>

    <div id="history-sec" class="section">
        <h5 class="mb-3"><i class="fas fa-history me-2"></i>Play History</h5>
        <div id="history-list"></div>
    </div>

    <div id="download-sec" class="section">
        <h5 class="mb-3"><i class="fas fa-folder-open me-2"></i>My Downloads</h5>
        <div id="download-list"></div>
    </div>

</div>

<div class="bottom-nav">
    <button class="nav-btn active" id="btn-home" onclick="showSection('home')"><i class="fas fa-home"></i>Home</button>
    <button class="nav-btn" id="btn-playing" onclick="showSection('playing')"><i class="fas fa-play"></i>Playing</button>
    <button class="nav-btn" id="btn-history" onclick="showSection('history')"><i class="fas fa-history"></i>History</button>
    <button class="nav-btn" id="btn-download" onclick="showSection('download')"><i class="fas fa-download"></i>Downloads</button>
</div>

<script>
    let nextPageToken = "";
    let currentQuery = "Bangla new songs";
    let playingUrl = "";

    // ১. ভিডিও লোড করা (Home)
    async function loadVideos(q, append = false) {
        document.getElementById('loader').style.display = "block";
        const res = await fetch(`/search?q=${encodeURIComponent(q)}&pageToken=${nextPageToken}`);
        const data = await res.json();
        
        const feed = document.getElementById('video-feed');
        if (!append) feed.innerHTML = "";
        
        data.videos.forEach(v => {
            // কোটেশন এরর এড়াতে ভ্যালুগুলোকে সেফলি পাস করা হয়েছে
            const safeUrl = encodeURIComponent(v.url);
            feed.innerHTML += `
                <div class="col">
                    <div class="v-card" onclick="playThis('${safeUrl}')">
                        <img src="${v.thumbnail}">
                        <div class="v-title">${v.title}</div>
                    </div>
                </div>`;
        });
        nextPageToken = data.nextPageToken;
        document.getElementById('loader').style.display = "none";
    }

    // ২. ভিডিও প্লে করা (ফিক্সড)
    async function playThis(encodedUrl) {
        const url = decodeURIComponent(encodedUrl);
        playingUrl = url;
        
        // প্লেয়িং সেকশন দেখাবে এবং বাটনে একটিভ ক্লাস যোগ করবে
        showSection('playing');
        document.getElementById('playTitle').innerText = "Loading details...";
        document.getElementById('mainVideo').src = "";
        
        try {
            const fd = new FormData();
            fd.append('url', url);
            const res = await fetch('/get_info', {method: 'POST', body: fd});
            const data = await res.json();
            
            if(data.error || !data.video_url) {
                document.getElementById('playTitle').innerText = "Error loading video streaming URL.";
                return;
            }
            
            document.getElementById('mainVideo').src = data.video_url;
            document.getElementById('playTitle').innerHTML = data.title;
            addToHistory(data.title);
        } catch (err) {
            document.getElementById('playTitle').innerText = "Server Error!";
        }
    }

    // ৩. সেকশন পরিবর্তন লজিক
    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(name + '-sec').classList.add('active');
        document.getElementById('btn-' + name).classList.add('active');
        
        if(name === 'download') loadDownloadFiles();
    }

    // ৪. ডাউনলোড লিস্ট লোড করা
    async function loadDownloadFiles() {
        const res = await fetch('/get_downloads');
        const files = await res.json();
        const list = document.getElementById('download-list');
        list.innerHTML = files.length ? "" : "<p class='text-muted'>কোন ফাইল ডাউনলোড করা হয়নি।</p>";
        files.forEach(f => {
            list.innerHTML += `<div class="list-item"><i class="fas fa-file-video text-info"></i> <span>${f}</span></div>`;
        });
    }

    // ৫. ইতিহাস ও সার্চ
    function addToHistory(title) {
        const list = document.getElementById('history-list');
        list.innerHTML = `<div class="list-item"><i class="fas fa-check-circle text-success"></i> ${title}</div>` + list.innerHTML;
    }

    function handleSearch() {
        const val = document.getElementById('searchInput').value.trim();
        if(!val) return;
        if(val.includes('http://') || val.includes('https://')) {
            playThis(encodeURIComponent(val));
        } else { 
            currentQuery = val; 
            nextPageToken = ""; 
            loadVideos(val); 
            showSection('home'); 
        }
    }

    function startDownload(q) {
        if(!playingUrl) {
            alert("প্রথমে একটি ভিডিও প্লে করুন।");
            return;
        }
        alert("ডাউনলোড শুরু হচ্ছে... ব্যাকএন্ডে প্রসেস হতে কিছুটা সময় লাগতে পারে। দয়া করে অপেক্ষা করুন।");
        window.location.href = `/download?url=${encodeURIComponent(playingUrl)}&quality=${q}`;
    }

    // আনলিমিটেড স্ক্রল
    window.onscroll = () => {
        if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 600) {
            if(document.getElementById('home-sec').classList.contains('active') && document.getElementById('loader').style.display === "none") {
                loadVideos(currentQuery, true);
            }
        }
    };

    window.onload = () => loadVideos(currentQuery);
</script>

</body>
</html>
