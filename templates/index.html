<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff0050; --secondary: #00f2ea; --dark: #121212; --card: #1e1e1e; }
        
        html, body { 
            background: var(--dark); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        .top-fixed-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: #121212;
            border-bottom: 1px solid #222;
        }
        .header { padding: 12px; }
        .search-bar { background: #222; border: 1px solid #444; color: white; border-radius: 50px; padding-left: 20px; }
        
        #homePlayerSection { 
            background: #1a1a1a; 
            padding: 10px; 
            display: none; 
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 999;
        }
        video, audio { width: 100%; border-radius: 8px; background: #000; max-height: 200px; object-fit: contain; }

        .main-content {
            position: absolute;
            top: 68px; 
            bottom: 70px; 
            left: 0;
            width: 100%;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
        }
        
        .inner-padding { padding: 10px 15px; }
        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; cursor: pointer; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-title { padding: 10px; font-size: 14px; font-weight: bold; height: 55px; overflow: hidden; color: #fff; }
        
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 2000; }
        .nav-btn { background: none; border: none; color: #888; font-size: 11px; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        .download-btn { border-radius: 50px; font-weight: bold; font-size: 11px; margin: 3px; }
        .list-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .progress-box { background: #1e1e1e; padding: 12px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        #localPlayerArea { background: #111; padding: 10px; border-radius: 12px; border: 1px solid #333; display: none; }
    </style>
</head>
<body>

<div class="top-fixed-container" id="topContainer">
    <div class="header">
        <div class="input-group">
            <input type="text" id="searchInput" class="form-control search-bar" placeholder="Search song or paste link...">
            <button class="btn btn-danger rounded-circle ms-2" onclick="handleNewSearch()"><i class="fas fa-search"></i></button>
        </div>
    </div>
</div>

<div class="main-content" id="mainContent" onscroll="handleScroll()">
    
    <div id="homeSection" class="section active">
        <div id="homePlayerSection">
            <div id="playerContainer" class="mb-1"></div>
            <div id="downloadOptions" class="text-center mb-1"></div>
        </div>
        
        <div class="inner-padding">
            <div id="videoResults" class="row"></div>
            <div id="scrollLoader" class="text-center w-100 my-3" style="display: none;">
                <div class="spinner-border text-danger spinner-border-sm"></div>
            </div>
        </div>
    </div>

    <div id="historySection" class="section">
        <div class="inner-padding">
            <h5 class="mb-3"><i class="fas fa-history text-secondary"></i> Search History</h5>
            <div id="historyList"></div>
        </div>
    </div>

    <div id="downloadsSection" class="section">
        <div class="inner-padding">
            
            <div id="progressBox" class="progress-box" style="display: none;">
                <div class="text-truncate small text-warning mb-2 fw-bold" id="downloadingTitle">Downloading...</div>
                <div class="d-flex justify-content-between mb-1">
                    <span id="progressStatus" class="fw-bold text-info small"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
                    <button class="btn btn-sm btn-danger py-0 px-2" style="font-size:10px;" onclick="cancelDownload()">Cancel</button>
                </div>
                <div class="progress mb-1" style="height: 8px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                </div>
                <div class="d-flex justify-content-between text-muted" style="font-size: 11px;">
                    <span id="downloadSpeed"><i class="fas fa-bolt"></i> 0 KB/s</span>
                    <span id="downloadEta"><i class="fas fa-clock"></i> 00:00</span>
                </div>
            </div>

            <div id="localPlayerArea" class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span class="small text-truncate text-success fw-bold" id="localPlayerTitle" style="max-width:80%;">Playing File</span>
                    <button class="btn btn-sm btn-dark rounded-circle text-danger py-0 px-2" onclick="closeLocalPlayer()">✕</button>
                </div>
                <div id="localMediaContainer"></div>
            </div>

            <h5 class="mb-3"><i class="fas fa-folder-open text-info"></i> My Downloads (This Device Only)</h5>
            <div id="downloadsList"></div>
        </div>
    </div>
</div>

<div class="bottom-nav">
    <button class="nav-btn active" id="btn-home" onclick="switchSection('home')"><i class="fas fa-home"></i>Home</button>
    <button class="nav-btn" id="btn-history" onclick="switchSection('history')"><i class="fas fa-history"></i>History</button>
    <button class="nav-btn" id="btn-downloads" onclick="switchSection('downloads')"><i class="fas fa-download"></i>Downloads</button>
</div>

<script>
    let intervalId = null;
    let isDownloading = false;
    let currentVideoTitle = "";
    
    // আনলিমিটেড স্ক্রোল ভেরিয়েবলস
    let currentQuery = "Bangla hit songs";
    let nextPageToken = "";
    let isLoadingNextPage = false;

    window.onload = function() {
        searchVideos(currentQuery, false);
    };

    function switchSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(sectionId + 'Section').classList.add('active');
        document.getElementById('btn-' + sectionId).classList.add('active');

        if(sectionId === 'downloads') {
            loadDownloads();
        }
    }

    function handleNewSearch() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;

        switchSection('home');
        if(query.includes('youtube.com') || query.includes('youtu.be')) {
            fetchVideoInfo(query);
        } else {
            currentQuery = query;
            nextPageToken = ""; 
            searchVideos(currentQuery, false);
        }
    }

    // আনলিমিটেড স্ক্রোল হ্যান্ডলার
    function handleScroll() {
        const mainContent = document.getElementById('mainContent');
        const homeSection = document.getElementById('homeSection');
        
        if (homeSection.classList.contains('active') && nextPageToken && !isLoadingNextPage) {
            if (mainContent.scrollTop + mainContent.clientHeight >= mainContent.scrollHeight - 150) {
                searchVideos(currentQuery, true);
            }
        }
    }

    function searchVideos(query, isNextPage = false) {
        isLoadingNextPage = true;
        const resultsDiv = document.getElementById('videoResults');
        const loader = document.getElementById('scrollLoader');
        
        if (!isNextPage) {
            resultsDiv.innerHTML = '<div class="text-center w-100 mt-5"><div class="spinner-border text-danger"></div></div>';
        } else {
            loader.style.display = 'block';
        }
        
        fetch(`/search?q=${encodeURIComponent(query)}&pageToken=${nextPageToken}`)
            .then(res => res.json())
            .then(data => {
                if (!isNextPage) resultsDiv.innerHTML = '';
                loader.style.display = 'none';
                
                if(!data.videos || data.videos.length === 0) {
                    if(!isNextPage) resultsDiv.innerHTML = '<p class="text-center w-100">No videos found.</p>';
                    isLoadingNextPage = false;
                    return;
                }
                
                nextPageToken = data.nextPageToken || "";
                
                data.videos.forEach(v => {
                    resultsDiv.innerHTML += `
                        <div class="col-md-4 col-sm-6 col-12">
                            <div class="v-card" onclick="fetchVideoInfo('${v.url}')">
                                <img src="${v.thumbnail}">
                                <div class="v-title">${v.title}</div>
                            </div>
                        </div>`;
                });
                isLoadingNextPage = false;
            }).catch(() => {
                loader.style.display = 'none';
                isLoadingNextPage = false;
            });
    }

    function fetchVideoInfo(url) {
        const playerSection = document.getElementById('homePlayerSection');
        const playerContainer = document.getElementById('playerContainer');
        const optionsDiv = document.getElementById('downloadOptions');
        
        playerSection.style.display = 'block';
        document.getElementById('mainContent').scrollTop = 0;
        
        playerContainer.innerHTML = '<div class="text-center p-3"><div class="spinner-border text-light spinner-border-sm"></div><p class="mt-1 small mb-0">Loading stream link...</p></div>';
        optionsDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('url', url);

        fetch('/get_info', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    playerContainer.innerHTML = `<div class="alert alert-danger p-2 small">Error loading stream!</div>`;
                    return;
                }
                
                currentVideoTitle = data.title;

                playerContainer.innerHTML = `
                    <div class="text-truncate small text-warning mb-1 fw-bold"><i class="fas fa-play text-danger me-1"></i> ${data.title}</div>
                    <video controls autoplay playsinline src="${data.video_url}"></video>`;

                optionsDiv.innerHTML = `
                    <div class="d-flex justify-content-center flex-wrap">
                        <button class="btn btn-primary download-btn px-2 py-1" onclick="triggerDownload('${data.url}', 'full_hd')">1080p MP4</button>
                        <button class="btn btn-info download-btn px-2 py-1 text-white" onclick="triggerDownload('${data.url}', 'medium_hd')">720p MP4</button>
                        <button class="btn btn-warning download-btn px-2 py-1 fw-bold" onclick="triggerDownload('${data.url}', 'mp3')"><i class="fas fa-music"></i> MP3 Audio</button>
                    </div>`;
            }).catch(() => {
                playerContainer.innerHTML = `<div class="alert alert-danger p-2 small">Failed to connect!</div>`;
            });
    }

    function triggerDownload(url, quality) {
        if(isDownloading) {
            alert("একটি ডাউনলোড ইতিমধ্যে চলছে!");
            return;
        }

        switchSection('downloads');
        document.getElementById('downloadingTitle').innerText = "Processing: " + currentVideoTitle;
        document.getElementById('progressBox').style.display = 'block';
        document.getElementById('progressBar').style.width = '0%';
        isDownloading = true;

        fetch(`/start_download?url=${encodeURIComponent(url)}&quality=${quality}`)
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    alert(data.error);
                    isDownloading = false;
                    document.getElementById('progressBox').style.display = 'none';
                    return;
                }
                intervalId = setInterval(checkProgress, 1000);
            });
    }

    function checkProgress() {
        fetch('/progress')
            .then(res => res.json())
            .then(data => {
                const bar = document.getElementById('progressBar');
                const status = document.getElementById('progressStatus');
                
                status.innerHTML = `<i class="fas fa-download text-success"></i> ${data.status.toUpperCase()}`;
                bar.style.width = data.progress + '%';
                bar.innerText = data.progress + '%';
                document.getElementById('downloadSpeed').innerHTML = `<i class="fas fa-bolt"></i> ${data.speed}`;
                document.getElementById('downloadEta').innerHTML = `<i class="fas fa-clock"></i> ${data.eta}`;

                if(data.status === 'completed') {
                    clearInterval(intervalId);
                    isDownloading = false;
                    status.innerText = "COMPLETED!";
                    
                    // ব্রাউজারে ফাইলের নাম সেভ লক করা হচ্ছে
                    saveFileToDevice(data.filename);

                    setTimeout(() => {
                        window.location.href = `/download_file/${encodeURIComponent(data.filename)}`;
                        document.getElementById('progressBox').style.display = 'none';
                        loadDownloads(); 
                    }, 1000);
                } 
                
                if(data.status === 'cancelled' || data.status === 'error') {
                    clearInterval(intervalId);
                    isDownloading = false;
                    setTimeout(() => {
                        document.getElementById('progressBox').style.display = 'none';
                    }, 2000);
                }
            });
    }

    function cancelDownload() {
        fetch('/cancel_download').then(() => {
            clearInterval(intervalId);
            isDownloading = false;
            document.getElementById('progressBox').style.display = 'none';
        });
    }

    function saveFileToDevice(filename) {
        let localFiles = JSON.parse(localStorage.getItem('my_downloads')) || [];
        if(!localFiles.includes(filename)){
            localFiles.push(filename);
            localStorage.setItem('my_downloads', JSON.stringify(localFiles));
        }
    }

    // ডিভাইস লকড ডাউনলোড লিস্ট জেনারেটর (ক্র্যাশ-প্রুফ)
    function loadDownloads() {
        const listDiv = document.getElementById('downloadsList');
        listDiv.innerHTML = '<p class="text-muted text-center small">Syncing with device...</p>';

        let localFiles = JSON.parse(localStorage.getItem('my_downloads')) || [];
        
        if(localFiles.length === 0) {
            listDiv.innerHTML = '<div class="text-center mt-5 text-muted"><i class="fas fa-folder-open fa-2x mb-2"></i><p class="small">No downloads found on this device.</p></div>';
            return;
        }

        listDiv.innerHTML = '';
        let validFilesCount = 0;
        let checkedCount = 0;

        localFiles.forEach((f, index) => {
            fetch(`/check_file/${encodeURIComponent(f)}`)
                .then(res => {
                    checkedCount++;
                    if(res.ok) {
                        validFilesCount++;
                        let icon = f.endsWith('.mp3') ? 'fa-file-audio text-warning' : 'fa-file-video text-info';
                        listDiv.innerHTML += `
                            <div class="list-item">
                                <div class="text-truncate fw-bold small" style="max-width: 55%; color: #fff;"><i class="fas ${icon} me-2"></i>${f}</div>
                                <div>
                                    <button class="btn btn-sm btn-info text-white rounded-pill px-2 py-0 me-1" style="font-size:11px;" onclick="playLocalFile('${f}')"><i class="fas fa-play"></i> Play</button>
                                    <a href="/download_file/${encodeURIComponent(f)}" class="btn btn-sm btn-success rounded-circle px-2 py-1"><i class="fas fa-arrow-down"></i></a>
                                </div>
                            </div>`;
                    } else {
                        // ফাইল ডিলিট হয়ে গেলে রিমুভ করবে লুপ আটকাবে না
                        localFiles.splice(index, 1);
                        localStorage.setItem('my_downloads', JSON.stringify(localFiles));
                    }
                    checkEmptyState(checkedCount, localFiles.length, validFilesCount, listDiv);
                })
                .catch(() => {
                    checkedCount++;
                    checkEmptyState(checkedCount, localFiles.length, validFilesCount, listDiv);
                });
        });
    }

    function checkEmptyState(checked, total, valid, targetDiv) {
        if(checked >= total && valid === 0) {
            targetDiv.innerHTML = '<div class="text-center mt-5 text-muted"><i class="fas fa-folder-open fa-2x mb-2"></i><p class="small">No downloads found on this device.</p></div>';
        }
    }

    function playLocalFile(filename) {
        const area = document.getElementById('localPlayerArea');
        const container = document.getElementById('localMediaContainer');
        
        document.getElementById('localPlayerTitle').innerText = "Playing: " + filename;
        area.style.display = 'block';
        document.getElementById('mainContent').scrollTop = 0;

        const fileUrl = `/download_file/${encodeURIComponent(filename)}`;
        if(filename.endsWith('.mp3')) {
            container.innerHTML = `<audio controls autoplay src="${fileUrl}"></audio>`;
        } else {
            container.innerHTML = `<video controls autoplay playsinline src="${fileUrl}"></video>`;
        }
    }

    function closeLocalPlayer() {
        document.getElementById('localPlayerArea').style.display = 'none';
        document.getElementById('localMediaContainer').innerHTML = '';
    }
</script>
</body>
    </html>
