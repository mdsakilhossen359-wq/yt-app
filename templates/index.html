<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Video App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff0050; --secondary: #00f2ea; --dark: #121212; --card: #1e1e1e; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding-bottom: 80px; }
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(10px); padding: 15px; border-bottom: 1px solid #333; }
        .search-bar { background: #222; border: 1px solid #444; color: white; border-radius: 50px; padding-left: 20px; }
        .v-card { background: var(--card); border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .v-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .v-title { padding: 10px; font-size: 14px; font-weight: bold; height: 55px; overflow: hidden; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 2000; }
        .nav-btn { background: none; border: none; color: #888; font-size: 11px; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 20px; display: block; margin-bottom: 3px; }
        .section { display: none; padding-top: 10px; }
        .section.active { display: block; }
        video { width: 100%; border-radius: 10px; background: #000; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .download-btn { border-radius: 50px; font-weight: bold; font-size: 12px; margin: 2px; }
        .list-item { background: #222; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .progress-box { background: #222; padding: 15px; border-radius: 10px; margin-top: 15px; display: none; }
        #homePlayerSection { background: #1a1a1a; padding: 10px; border-radius: 12px; margin-bottom: 20px; display: none; border: 1px solid #333; }
    </style>
</head>
<body>

<div class="header">
    <div class="input-group">
        <input type="text" id="searchInput" class="form-control search-bar" placeholder="Search song or paste link...">
        <button class="btn btn-danger rounded-circle ms-2" onclick="handleSearch()"><i class="fas fa-search"></i></button>
    </div>
</div>

<div class="container mt-3">
    <!-- হোম সেকশন -->
    <div id="homeSection" class="section active">
        <!-- হোম পেজের ওপরেই ভিডিও প্লেয়ার ইনজেক্ট হবে -->
        <div id="homePlayerSection">
            <div id="playerContainer" class="mb-2"></div>
            <div id="downloadOptions" class="text-center mb-2"></div>
            
            <!-- প্রোগ্রেস বক্স -->
            <div id="progressBox" class="progress-box">
                <div class="d-flex justify-content-between mb-1">
                    <span id="progressStatus" class="fw-bold text-warning">Idle</span>
                    <button class="btn btn-sm btn-danger py-0" onclick="cancelDownload()">Cancel</button>
                </div>
                <div class="progress mb-2" style="height: 10px;">
                    <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%"></div>
                </div>
                <div class="d-flex justify-content-between text-muted small">
                    <span id="downloadSpeed"><i class="fas fa-bolt"></i> 0 KB/s</span>
                    <span id="downloadEta"><i class="fas fa-clock"></i> 00:00</span>
                </div>
            </div>
        </div>
        
        <!-- ভিডিও লিস্ট রেজাল্ট -->
        <div id="videoResults" class="row"></div>
    </div>

    <!-- হিস্ট্রি সেকশন -->
    <div id="historySection" class="section">
        <h5 class="mb-3"><i class="fas fa-history text-secondary"></i> Search History</h5>
        <div id="historyList"></div>
    </div>

    <!-- ডাউনলোডস সেকশন -->
    <div id="downloadsSection" class="section">
        <h5 class="mb-3"><i class="fas fa-folder-open text-info"></i> My Downloads</h5>
        <div id="downloadsList"></div>
    </div>
</div>

<!-- বটম নেভিগেশন বার -->
<div class="bottom-nav">
    <button class="nav-btn active" id="btn-home" onclick="switchSection('home')"><i class="fas fa-home"></i>Home</button>
    <button class="nav-btn" id="btn-history" onclick="switchSection('history')"><i class="fas fa-history"></i>History</button>
    <button class="nav-btn" id="btn-downloads" onclick="switchSection('downloads')"><i class="fas fa-download"></i>Downloads</button>
</div>

<script>
    let intervalId = null;
    let isDownloading = false;

    window.onload = function() {
        searchVideos('Bangla hit songs');
    };

    function switchSection(sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(sectionId + 'Section').classList.add('active');
        document.getElementById('btn-' + sectionId).classList.add('active');

        if(sectionId === 'downloads') {
            loadDownloads();
        }
    }

    function handleSearch() {
        const query = document.getElementById('searchInput').value;
        if(!query) return;

        switchSection('home');
        if(query.includes('youtube.com') || query.includes('youtu.be')) {
            fetchVideoInfo(query);
        } else {
            searchVideos(query);
        }
    }

    function searchVideos(query) {
        const resultsDiv = document.getElementById('videoResults');
        resultsDiv.innerHTML = '<div class="text-center w-100 mt-5"><div class="spinner-border text-danger"></div></div>';
        
        fetch(`/search?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                resultsDiv.innerHTML = '';
                if(data.videos.length === 0) {
                    resultsDiv.innerHTML = '<p class="text-center w-100">No videos found.</p>';
                    return;
                }
                data.videos.forEach(v => {
                    resultsDiv.innerHTML += `
                        <div class="col-md-4 col-sm-6 col-12">
                            <div class="v-card" onclick="fetchVideoInfo('${v.url}')">
                                <img src="${v.thumbnail}">
                                <div class="v-title">${v.title}</div>
                            </div>
                        </div>`;
                });
            });
    }

    function fetchVideoInfo(url) {
        const playerSection = document.getElementById('homePlayerSection');
        const playerContainer = document.getElementById('playerContainer');
        const optionsDiv = document.getElementById('downloadOptions');
        
        playerSection.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' }); // ক্লিক করলেই ওপরে স্ক্রোল হবে
        
        playerContainer.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-light"></div><p class="mt-2 mb-0">Loading video player on top...</p></div>';
        optionsDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('url', url);

        fetch('/get_info', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    playerContainer.innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                    return;
                }

                playerContainer.innerHTML = `
                    <h6 class="mb-2 text-wrap text-warning"><i class="fas fa-play text-danger me-1"></i> ${data.title}</h6>
                    <video controls autoplay src="${data.video_url}"></video>`;

                optionsDiv.innerHTML = `
                    <div class="d-flex justify-content-center flex-wrap mt-2">
                        <button class="btn btn-primary download-btn px-3 py-2" onclick="triggerDownload('${data.url}', '1080p')">1080p MP4</button>
                        <button class="btn btn-info download-btn px-3 py-2 text-white" onclick="triggerDownload('${data.url}', '720p')">720p MP4</button>
                        <button class="btn btn-warning download-btn px-3 py-2 fw-bold" onclick="triggerDownload('${data.url}', 'mp3')">MP3 Audio</button>
                    </div>`;
            });
    }

    function triggerDownload(url, quality) {
        if(isDownloading) {
            alert("একটি ডাউনলোড অলরেডি চলছে!");
            return;
        }

        document.getElementById('progressBox').style.display = 'block';
        const bar = document.getElementById('progressBar');
        bar.style.width = '0%';
        bar.innerText = '0%';
        isDownloading = true;

        fetch(`/start_download?url=${encodeURIComponent(url)}&quality=${quality}`)
            .then(res => res.json())
            .then(data => {
                if(data.error) {
                    alert(data.error);
                    isDownloading = false;
                    document.getElementById('progressBox').style.display = 'none';
                    return;
                }
                intervalId = setInterval(checkProgress, 1000);
            });
    }

    function checkProgress() {
        fetch('/progress')
            .then(res => res.json())
            .then(data => {
                const bar = document.getElementById('progressBar');
                const status = document.getElementById('progressStatus');
                
                status.innerText = data.status.toUpperCase();
                bar.style.width = data.progress + '%';
                bar.innerText = data.progress + '%';
                document.getElementById('downloadSpeed').innerHTML = `<i class="fas fa-bolt"></i> ${data.speed}`;
                document.getElementById('downloadEta').innerHTML = `<i class="fas fa-clock"></i> ${data.eta}`;

                if(data.status === 'completed' && data.progress >= 100) {
                    clearInterval(intervalId);
                    isDownloading = false;
                    status.innerText = "COMPLETED!";
                    
                    // ডাউনলোড শেষ হলে সাথে সাথে ফাইলটি ব্রাউজারের মাধ্যমে ফোনে পুশ হবে
                    setTimeout(() => {
                        window.location.href = `/play_file/${data.filename}`;
                        loadDownloads(); // ডাউনলোডস লিস্ট ব্যাকগ্রাউন্ডে রিফ্রেশ করে নেওয়া
                    }, 1000);
                } 
                
                if(data.status === 'cancelled' || data.status === 'error') {
                    clearInterval(intervalId);
                    isDownloading = false;
                }
            });
    }

    function cancelDownload() {
        fetch('/cancel_download')
            .then(res => res.json())
            .then(() => {
                clearInterval(intervalId);
                isDownloading = false;
                document.getElementById('progressStatus').innerText = "CANCELLED";
                document.getElementById('progressBar').style.width = '0%';
            });
    }

    function loadDownloads() {
        const listDiv = document.getElementById('downloadsList');
        listDiv.innerHTML = '<p class="text-muted text-center">Loading files...</p>';

        fetch('/get_downloads')
            .then(res => res.json())
            .then(files => {
                listDiv.innerHTML = '';
                if(!files || files.length === 0) {
                    listDiv.innerHTML = '<div class="text-center mt-5 text-muted"><i class="fas fa-folder-open fa-3x mb-3"></i><p>No downloads found.</p></div>';
                    return;
                }
                files.forEach(f => {
                    listDiv.innerHTML += `
                        <div class="list-item">
                            <div class="text-truncate fw-bold small" style="max-width: 75%; color: #00f2ea;"><i class="fas fa-file-video me-2"></i>${f}</div>
                            <a href="/play_file/${f}" class="btn btn-sm btn-success rounded-circle px-2 py-1"><i class="fas fa-arrow-down"></i></a>
                        </div>`;
                });
            });
    }
</script>
</body>
</html>
